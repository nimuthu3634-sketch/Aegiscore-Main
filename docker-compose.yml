services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegiscore}
      POSTGRES_USER: ${POSTGRES_USER:-aegiscore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegiscore_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-aegiscore} -d ${POSTGRES_DB:-aegiscore}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      APP_ENV: docker
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-aegiscore}:${POSTGRES_PASSWORD:-aegiscore_dev_password}@postgres:5432/${POSTGRES_DB:-aegiscore}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-with-a-development-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      WAZUH_BASE_URL: ${WAZUH_BASE_URL:-http://wazuh-manager:55000}
      WAZUH_USERNAME: ${WAZUH_USERNAME:-}
      WAZUH_PASSWORD: ${WAZUH_PASSWORD:-}
      WAZUH_BEARER_TOKEN: ${WAZUH_BEARER_TOKEN:-}
      WAZUH_AUTH_MODE: ${WAZUH_AUTH_MODE:-basic}
      WAZUH_AUTH_ENDPOINT: ${WAZUH_AUTH_ENDPOINT:-/security/user/authenticate}
      WAZUH_ALERTS_PATH: ${WAZUH_ALERTS_PATH:-/alerts}
      WAZUH_CONNECTOR_ENABLED: ${WAZUH_CONNECTOR_ENABLED:-true}
      WAZUH_POLL_INTERVAL_SECONDS: ${WAZUH_POLL_INTERVAL_SECONDS:-30}
      WAZUH_TIMEOUT_SECONDS: ${WAZUH_TIMEOUT_SECONDS:-10}
      WAZUH_RETRY_ATTEMPTS: ${WAZUH_RETRY_ATTEMPTS:-2}
      WAZUH_RETRY_BACKOFF_SECONDS: ${WAZUH_RETRY_BACKOFF_SECONDS:-1}
      WAZUH_VERIFY_TLS: ${WAZUH_VERIFY_TLS:-true}
      WAZUH_CA_FILE: ${WAZUH_CA_FILE:-}
      WAZUH_PAGE_SIZE: ${WAZUH_PAGE_SIZE:-200}
      WAZUH_MAX_PAGES_PER_CYCLE: ${WAZUH_MAX_PAGES_PER_CYCLE:-5}
      WAZUH_OFFSET_PARAM: ${WAZUH_OFFSET_PARAM:-offset}
      WAZUH_SINCE_PARAM: ${WAZUH_SINCE_PARAM:-since}
      WAZUH_TIMESTAMP_FIELD: ${WAZUH_TIMESTAMP_FIELD:-timestamp}
      SURICATA_SOURCE: ${SURICATA_SOURCE:-suricata}
      SURICATA_CONNECTOR_ENABLED: ${SURICATA_CONNECTOR_ENABLED:-true}
      SURICATA_CONNECTOR_MODE: ${SURICATA_CONNECTOR_MODE:-file_tail}
      SURICATA_EVE_FILE_PATH: ${SURICATA_EVE_FILE_PATH:-/var/log/suricata/eve.json}
      SURICATA_POLL_INTERVAL_SECONDS: ${SURICATA_POLL_INTERVAL_SECONDS:-15}
      SURICATA_MAX_EVENTS_PER_CYCLE: ${SURICATA_MAX_EVENTS_PER_CYCLE:-250}
      SURICATA_RETRY_ATTEMPTS: ${SURICATA_RETRY_ATTEMPTS:-2}
      SURICATA_RETRY_BACKOFF_SECONDS: ${SURICATA_RETRY_BACKOFF_SECONDS:-1}
      SURICATA_FAIL_WHEN_SOURCE_MISSING: ${SURICATA_FAIL_WHEN_SOURCE_MISSING:-true}
      DEV_SEED_ADMIN_USERNAME: ${DEV_SEED_ADMIN_USERNAME:-admin}
      DEV_SEED_ADMIN_PASSWORD: ${DEV_SEED_ADMIN_PASSWORD:-AegisCore123!}
      DEV_SEED_ANALYST_USERNAME: ${DEV_SEED_ANALYST_USERNAME:-analyst}
      DEV_SEED_ANALYST_PASSWORD: ${DEV_SEED_ANALYST_PASSWORD:-AegisCore123!}
      SCORING_STRATEGY: ${SCORING_STRATEGY:-baseline}
      SCORING_BASELINE_VERSION: ${SCORING_BASELINE_VERSION:-baseline_v1}
      SCORING_MODEL_PATH: ${SCORING_MODEL_PATH:-/srv/ai/models/aegiscore-risk-priority-model.joblib}
      SCORING_MODEL_METADATA_PATH: ${SCORING_MODEL_METADATA_PATH:-/srv/ai/models/aegiscore-risk-priority-model.metadata.json}
      SCORING_MODEL_VERSION: ${SCORING_MODEL_VERSION:-untrained}
      AUTOMATED_RESPONSE_ALLOW_DESTRUCTIVE: ${AUTOMATED_RESPONSE_ALLOW_DESTRUCTIVE:-false}
      AUTOMATED_RESPONSE_MAX_RETRIES: ${AUTOMATED_RESPONSE_MAX_RETRIES:-1}
      AUTOMATED_RESPONSE_BUILTIN_ADAPTERS_ENABLED: ${AUTOMATED_RESPONSE_BUILTIN_ADAPTERS_ENABLED:-true}
      AUTOMATED_RESPONSE_LAB_ADAPTERS_ENABLED: ${AUTOMATED_RESPONSE_LAB_ADAPTERS_ENABLED:-false}
      AUTOMATED_RESPONSE_BLOCK_IP_BACKEND: ${AUTOMATED_RESPONSE_BLOCK_IP_BACKEND:-ledger}
      AUTOMATED_RESPONSE_DISABLE_USER_BACKEND: ${AUTOMATED_RESPONSE_DISABLE_USER_BACKEND:-ledger}
      AUTOMATED_RESPONSE_LEDGER_PATH: ${AUTOMATED_RESPONSE_LEDGER_PATH:-/tmp/aegiscore-response-ledger.jsonl}
      AUTOMATED_RESPONSE_HOST_TAG_PATH: ${AUTOMATED_RESPONSE_HOST_TAG_PATH:-/tmp/aegiscore-host-tags.jsonl}
      AUTOMATED_RESPONSE_ENABLE_HOST_TAG_WRITE: ${AUTOMATED_RESPONSE_ENABLE_HOST_TAG_WRITE:-false}
      NOTIFICATIONS_ENABLED: ${NOTIFICATIONS_ENABLED:-false}
      NOTIFICATIONS_MODE: ${NOTIFICATIONS_MODE:-log}
      NOTIFICATIONS_RISK_THRESHOLD: ${NOTIFICATIONS_RISK_THRESHOLD:-85}
      NOTIFICATIONS_INCIDENT_STATES: ${NOTIFICATIONS_INCIDENT_STATES:-triaged,investigating,contained}
      NOTIFICATIONS_RESPONSE_STATUSES: ${NOTIFICATIONS_RESPONSE_STATUSES:-warning,failed}
      NOTIFICATIONS_RESPONSE_ACTION_TYPES: ${NOTIFICATIONS_RESPONSE_ACTION_TYPES:-*}
      NOTIFICATIONS_ADMIN_RECIPIENTS: ${NOTIFICATIONS_ADMIN_RECIPIENTS:-admin@aegiscore.local}
      NOTIFICATIONS_SENDER: ${NOTIFICATIONS_SENDER:-aegiscore@localhost}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-false}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-10}
      DB_CONNECT_MAX_ATTEMPTS: ${DB_CONNECT_MAX_ATTEMPTS:-25}
      DB_CONNECT_BACKOFF_SECONDS: ${DB_CONNECT_BACKOFF_SECONDS:-2}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/srv/apps/api
      - ./ai:/srv/ai
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-aegiscore}:${POSTGRES_PASSWORD:-aegiscore_dev_password}@postgres:5432/${POSTGRES_DB:-aegiscore}
      WORKER_POLL_INTERVAL_SECONDS: 15
    volumes:
      - ./apps/worker:/srv/apps/worker
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from sqlalchemy import create_engine, text; import os; db_url = os.environ['DATABASE_URL']; engine = create_engine(db_url, pool_pre_ping=True); conn = engine.connect(); conn.execute(text('SELECT 1')); conn.close()"
        ]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://api:8000}
      VITE_ENABLE_DEV_AUTH_BOOTSTRAP: ${VITE_ENABLE_DEV_AUTH_BOOTSTRAP:-false}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./apps/web:/srv/apps/web
      - web_node_modules:/srv/apps/web/node_modules
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('node:http').get('http://127.0.0.1:5173', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1));"
        ]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 25s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1/ || exit 1"
        ]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 20s

volumes:
  postgres_data:
  web_node_modules:
